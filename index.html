<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <!-- Paint the first frame dark before any stylesheet arrives (the app CSS is
         JS-injected in dev), preventing a white flash on load/reload. Keep the
         color in sync with --bg in src/styles/globals.css. -->
    <style>html { background-color: #0b0f17; }</style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <title>Your Name — Front-end Developer</title>
    <meta name="description" content="Portfolio of a front-end developer — projects, skills, and an interactive terminal." />
    <!-- Social cards. Keep in sync with the title/description above and your
         content.ts profile. og:image must be an absolute URL once deployed —
         swap the domain placeholder below. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Your Name — Front-end Developer" />
    <meta property="og:description" content="Portfolio of a front-end developer — projects, skills, and an interactive terminal." />
    <meta property="og:url" content="https://your-domain.example/" />
    <meta property="og:image" content="https://your-domain.example/portrait.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Your Name — Front-end Developer" />
    <meta name="twitter:description" content="Portfolio of a front-end developer — projects, skills, and an interactive terminal." />
    <meta name="twitter:image" content="https://your-domain.example/portrait.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
